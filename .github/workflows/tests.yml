name: Tests

on: ['push', 'pull_request']

jobs:
  ci:
    name: JS Package Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ['22', '24']

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test
